apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    isDefault: true
    editable: true
    jsonData:
      nodeGraph:
        enabled: true
      serviceMap:
        enabled: true
      search:
        enabled: true
      lokiSearch:
        enabled: true
      datasourceUid: loki

  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    isDefault: false
    editable: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
